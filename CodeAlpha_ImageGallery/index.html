<!DOCTYPE html>
<html>

<head>

<title>Image Gallery</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1 class="title">Image Gallery</h1>

<div class="menu">

<button onclick="showGallery('food', this)">Food</button>

<button onclick="showGallery('beach', this)">Beach</button>

<button onclick="showGallery('mountain', this)">Mountain</button>

<button onclick="showGallery('restaurant', this)">Restaurant</button>

</div>


<div class="gallery-container">

<!-- FOOD -->
<div id="food" class="gallery">

<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">

<img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d">

<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">

</div>


<!-- BEACH -->
<div id="beach" class="gallery">

<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">

<img src="https://images.unsplash.com/photo-1493558103817-58b2924bce98">

<img src="https://images.unsplash.com/photo-1473116763249-2faaef81ccda">

</div>


<!-- MOUNTAIN -->
<div id="mountain" class="gallery">

<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">

<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">



</div>


<!-- RESTAURANT -->
<div id="restaurant" class="gallery">

<img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5">

<img src="https://images.unsplash.com/photo-1559339352-11d035aa65de">

<img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4">

</div>

</div>


<!-- LIGHTBOX -->
<div id="lightbox">
<span onclick="closeLightbox()">×</span>
<img id="lightbox-img">
</div>


<script src="script.js"></script>

</body>
  </html>
